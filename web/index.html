<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="NIKO'$ - Copa do Mundo 2026">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="NIKO'$">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>NIKO'$ - Copa do Mundo 2026</title>
  <link rel="manifest" href="manifest.json">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: linear-gradient(135deg, #CC0000 0%, #8B0000 50%, #660000 100%);
      min-height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    
    .loading-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }
    
    /* Elementos flutuantes 3D */
    .floating-ball {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.3), rgba(255,255,255,0.05));
      animation: float 4s ease-in-out infinite;
    }
    
    .ball-1 { width: 100px; height: 100px; top: 10%; left: 10%; animation-delay: 0s; }
    .ball-2 { width: 60px; height: 60px; top: 20%; right: 15%; animation-delay: 1s; }
    .ball-3 { width: 80px; height: 80px; bottom: 25%; left: 5%; animation-delay: 2s; }
    .ball-4 { width: 50px; height: 50px; bottom: 15%; right: 10%; animation-delay: 0.5s; }
    .ball-5 { width: 120px; height: 120px; top: 50%; right: 5%; animation-delay: 1.5s; opacity: 0.3; }
    
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(10deg); }
    }
    
    /* Logo principal */
    .logo-container {
      background: white;
      padding: 25px 50px;
      border-radius: 20px;
      box-shadow: 
        0 20px 60px rgba(0,0,0,0.3),
        0 0 0 1px rgba(255,255,255,0.1) inset;
      animation: pulse 2s ease-in-out infinite, slideUp 0.8s ease-out;
      position: relative;
      z-index: 10;
    }
    
    .logo-text {
      font-size: 48px;
      font-weight: 900;
      color: #CC0000;
      letter-spacing: 6px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    
    @keyframes slideUp {
      from { 
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    /* Badge Copa */
    .copa-badge {
      margin-top: 20px;
      background: linear-gradient(135deg, #FFD700, #FFA500);
      padding: 10px 30px;
      border-radius: 25px;
      box-shadow: 0 8px 25px rgba(255,215,0,0.4);
      animation: slideUp 0.8s ease-out 0.2s both;
    }
    
    .copa-text {
      color: #333;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 3px;
    }
    
    /* Spinner 3D */
    .spinner-container {
      margin-top: 40px;
      animation: slideUp 0.8s ease-out 0.4s both;
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .loading-text {
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      margin-top: 15px;
      letter-spacing: 2px;
      animation: slideUp 0.8s ease-out 0.6s both;
    }
    
    /* Bola de futebol decorativa */
    .soccer-icon {
      position: absolute;
      top: 15%;
      right: 20%;
      font-size: 60px;
      opacity: 0.2;
      animation: bounce 3s ease-in-out infinite;
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(180deg); }
    }
  </style>
</head>
<body>
  <div id="loading" class="loading-container">
    <!-- Bolas flutuantes 3D -->
    <div class="floating-ball ball-1"></div>
    <div class="floating-ball ball-2"></div>
    <div class="floating-ball ball-3"></div>
    <div class="floating-ball ball-4"></div>
    <div class="floating-ball ball-5"></div>
    
    <!-- Bola de futebol decorativa -->
    <div class="soccer-icon">⚽</div>
    
    <!-- Logo principal -->
    <div class="logo-container">
      <div class="logo-text">NIKO'$</div>
    </div>
    
    <!-- Badge da Copa -->
    <div class="copa-badge">
      <div class="copa-text">COPA DO MUNDO 2026</div>
    </div>
    
    <!-- Spinner -->
    <div class="spinner-container">
      <div class="spinner"></div>
    </div>
    <div class="loading-text">Carregando...</div>
  </div>

  <script>
    // Fix for locale detection issues
    if (!navigator.language && !navigator.languages) {
      Object.defineProperty(navigator, 'language', { value: 'pt-BR', configurable: true });
      Object.defineProperty(navigator, 'languages', { value: ['pt-BR', 'pt', 'en'], configurable: true });
    }
  </script>
  
  <script src="flutter_bootstrap.js" async></script>
  
  <script>
    window.addEventListener('flutter-first-frame', function() {
      var loading = document.getElementById('loading');
      if (loading) {
        loading.style.opacity = '0';
        loading.style.transition = 'opacity 0.5s ease-out';
        setTimeout(function() {
          loading.style.display = 'none';
        }, 500);
      }
    });
  </script>
</body>
</html>
